<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Anticola - Prof. Adriano</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #121212; font-family: sans-serif; color: white; text-align: center; overflow: hidden; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 500px; margin: 50px auto; width: 90%; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: 2px solid #00c853; background: #2b2b2b; color: white; margin-bottom: 15px; }
        .btn { padding: 15px 30px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; margin-top: 10px; }
        .btn-config { background: #555; color: white; }
        .btn-iniciar { background: #00c853; color: white; }
        #container-prova { width: 100%; height: 100vh; display: none; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
        #aviso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="painel-entrada">
        <div class="card">
            <div id="setup-professor">
                <h3>⚙️ Configuração do Professor</h3>
                <input type="text" id="url-input" placeholder="Cole o link do Forms (finalizado em =0)">
                <button class="btn btn-config" onclick="travarProva()">TRAVAR PROVA</button>
            </div>

            <div id="area-aluno" style="display:none">
                <h1>✍️ Avaliação Online</h1>
                <p>Clique abaixo para iniciar. Se sair da página, a prova será resetada.</p>
                <button class="btn btn-iniciar" onclick="iniciarProva()">INICIAR AGORA</button>
            </div>
        </div>
    </div>

    <div id="aviso">
        <h1 style="color:red">⚠️ BLOQUEADO POR COLA</h1>
        <p>Você saiu da aba! O formulário foi resetado.</p>
        <div style="font-size:4em; font-weight:bold" id="num-saidas">0</div>
        <button class="btn" style="width:250px" onclick="voltar()">RECOMEÇAR FORMULÁRIO</button>
    </div>

    <div id="container-prova">
        <iframe id="prova-frame" src=""></iframe>
    </div>

    <script>
        let contador = 0;
        let linkOriginal = "";

        function travarProva() {
            linkOriginal = document.getElementById('url-input').value.trim();
            if (linkOriginal.includes("entry.")) {
                document.getElementById('setup-professor').style.display = "none";
                document.getElementById('area-aluno').style.display = "block";
            } else {
                alert("Por favor, cole o link gerado pelo Script (o que termina em =0).");
            }
        }

        function iniciarProva() {
            document.getElementById('painel-entrada').style.display = "none";
            document.getElementById('container-prova').style.display = "block";
            // Carrega o link original
            document.getElementById('prova-frame').src = linkOriginal;
            
            ativarSeguranca();
        }

        function ativarSeguranca() {
            document.addEventListener("visibilitychange", function() {
                if (document.hidden) {
                    contador++;
                    document.getElementById('num-saidas').innerText = contador;
                    
                    // INCREMENTO E RESET:
                    // 1. Atualiza o ID_SISTEMA com o número de colas
                    let novoLink = linkOriginal.replace(/=\d+$/, "=" + contador);
                    
                    // 2. O truque para resetar o formulário: mudamos o SRC para vazio e depois para o novo link com um marcador de tempo
                    document.getElementById('prova-frame').src = ""; 
                    setTimeout(() => {
                        document.getElementById('prova-frame').src = novoLink + "&refresh=" + Date.now();
                    }, 100);

                    document.getElementById('container-prova').style.display = "none";
                    document.getElementById('aviso').style.display = "flex";
                }
            });
        }

        function voltar() {
            document.getElementById('container-prova').style.display = "block";
            document.getElementById('aviso').style.display = "none";
        }
    </script>
</body>
</html>
