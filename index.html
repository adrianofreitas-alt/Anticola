<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Corrente Alternada - Anticola</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #202124; font-family: sans-serif; overflow: hidden; }
        #container-prova { width: 100%; height: 100vh; transition: filter 0.3s; }
        iframe { width: 100%; height: 100%; border: none; }
        .blurred { filter: blur(25px); pointer-events: none; }
        #aviso { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: white; 
            padding: 30px; border-radius: 15px; text-align: center; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 9999; 
        }
        #contador-texto { color: red; font-size: 2em; font-weight: bold; margin: 15px 0; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="aviso">
        <h2>⚠️ ATIVIDADE SUSPENSA</h2>
        <p>Você saiu da aba da prova para pesquisar.</p>
        <p>Número de desvios registrados:</p>
        <div id="contador-texto"><span id="num-saidas">0</span></div>
        <p><strong>INSTRUÇÃO:</strong> No final da prova, escreva este número no campo "ID_SISTEMA".</p>
        <button onclick="voltar()">Retomar Prova</button>
    </div>

    <div id="container-prova">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScxoIL_t1im8jv_Xk5WkK8Sx_HYsH36c148hwflznv-djBplw/viewform"></iframe>
    </div>

    <script>
        let contador = 0;
        const aviso = document.getElementById('aviso');
        const display = document.getElementById('num-saidas');

        function bloquear() {
            contador++;
            display.innerText = contador;
            document.getElementById('container-prova').classList.add('blurred');
            aviso.style.display = 'block';
        }

        function voltar() {
            document.getElementById('container-prova').classList.remove('blurred');
            aviso.style.display = 'none';
        }

        document.addEventListener("visibilitychange", function() {
            if (document.hidden) { bloquear(); }
        });
    </script>
</body>
</html>
