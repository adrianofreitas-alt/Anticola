<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Anticola v3 - Prof. Adriano</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #202124; font-family: sans-serif; overflow: hidden; }
        #painel-professor { padding: 50px; text-align: center; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .container-input { width: 80%; max-width: 600px; display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 2px solid #00c853; font-size: 1em; outline: none; }
        .btn-iniciar { background: #00c853; color: white; border: none; padding: 15px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.2em; }
        
        #container-prova { width: 100%; height: 100vh; display: none; }
        /* O segredo: tentamos esconder o topo do forms onde estaria a primeira pergunta se possível, 
           mas como é iframe, o melhor é o foco automático */
        iframe { width: 100%; height: 100%; border: none; }
        
        .blurred { filter: blur(25px); pointer-events: none; }
        #aviso { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 9999; width: 300px;}
        #contador-texto { color: red; font-size: 3em; font-weight: bold; margin: 10px 0; }
        .btn-liberar { background: #d93025; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div id="painel-professor" id="painel">
        <h1>🛡️ Painel Anticola Profissional</h1>
        <p>Cole o link "Preenchido Previamente" (com o 999 no final):</p>
        <div class="container-input">
            <input type="text" id="url-forms" placeholder="https://docs.google.com/forms/...entry.123=999">
        </div>
        <button class="btn-iniciar" onclick="iniciarProva()">INICIAR PROVA</button>
    </div>

    <div id="aviso">
        <h2>⚠️ BLOQUEADO</h2>
        <p>Saída detectada!</p>
        <div id="contador-texto"><span id="num-saidas">0</span></div>
        <button class="btn-liberar" onclick="voltar()">VOLTAR PARA PROVA</button>
    </div>

    <div id="container-prova">
        <iframe id="prova-frame" src=""></iframe>
    </div>

    <script>
        let contador = 0;
        let linkOriginal = "";
        const frame = document.getElementById('prova-frame');

        function iniciarProva() {
            linkOriginal = document.getElementById('url-forms').value;
            if (linkOriginal.includes("999")) {
                frame.src = linkOriginal.replace("999", "0");
                document.getElementById('painel-professor').style.display = "none";
                document.getElementById('container-prova').style.display = "block";
                
                // Bloqueios
                document.addEventListener("visibilitychange", () => { 
                    if (document.hidden) {
                        contador++;
                        document.getElementById('num-saidas').innerText = contador;
                        // Força o link a atualizar com o contador ANTES do aluno voltar
                        frame.src = linkOriginal.replace("999", contador);
                        document.getElementById('container-prova').classList.add('blurred');
                        document.getElementById('aviso').style.display = 'block';
                    }
                });
            } else {
                alert("Cole o link gerado com o número 999!");
            }
        }

        function voltar() {
            document.getElementById('container-prova').classList.remove('blurred');
            document.getElementById('aviso').style.display = 'none';
        }

        // Impede o aluno de usar o botão direito para tentar inspecionar o código
        document.oncontextmenu = () => false;
    </script>
</body>
</html>
