<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Anticola - Prof. Adriano</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #121212; font-family: sans-serif; color: white; text-align: center; overflow: hidden; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 500px; margin: 30px auto; width: 90%; }
        input { width: 95%; padding: 12px; border-radius: 8px; border: 2px solid #1a73e8; background: #2b2b2b; color: white; margin-bottom: 15px; }
        .url-gerada { background: #000; padding: 15px; border-radius: 5px; color: #00c853; word-break: break-all; font-family: monospace; font-size: 11px; border: 1px solid #00c853; cursor: pointer; }
        video { width: 100%; max-width: 350px; border-radius: 10px; background: #000; transform: scaleX(-1); }
        .btn { padding: 15px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; margin-top: 10px; }
        .btn-gerar { background: #1a73e8; color: white; }
        .btn-foto { background: #f4b400; color: #000; }
        .btn-iniciar { background: #00c853; color: white; display: none; }
        #container-prova { width: 100%; height: 100vh; display: none; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
        #aviso-bloqueio { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="interface-usuario">
        <div class="card">
            <div id="secao-professor">
                <h2>👨‍🏫 Gerador de Link</h2>
                <p>Cole o link do Forms aqui:</p>
                <input type="text" id="input-forms" placeholder="https://docs.google.com/forms/...">
                <button class="btn btn-gerar" onclick="gerarLinkAcesso()">GERAR LINK DO ALUNO</button>
                <div id="resultado-link" style="display:none; margin-top:15px;">
                    <p style="font-size: 12px; color: #aaa;">Copie este link e mande para a turma:</p>
                    <div class="url-gerada" id="link-final-texto" onclick="copiarLink()"></div>
                </div>
            </div>

            <div id="secao-aluno" style="display:none">
                <h1>📸 Identificação</h1>
                <p>Capture sua foto para entrar na prova.</p>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none"></canvas>
                <button class="btn btn-foto" id="btn-snap" onclick="tirarFoto()">CAPTURAR FOTO</button>
                <button class="btn btn-iniciar" id="btn-start" onclick="validarEIniciar()">ENTRAR NA PROVA</button>
            </div>
        </div>
    </div>

    <div id="aviso-bloqueio">
        <h1 style="color:red;">⚠️ ALERTA DE COLA</h1>
        <p>Você saiu da página! O formulário foi resetado.</p>
        <div style="font-size:4em; color:white;" id="contagem-saidas">0</div>
        <button class="btn" style="width:250px; background:white; color:black" onclick="desbloquear()">RECOMEÇAR TUDO</button>
    </div>

    <div id="container-prova">
        <iframe id="prova-frame" src=""></iframe>
    </div>

    <script>
        let contadorSaidas = 0;
        let linkDaProvaPura = "";

        // Tenta ler o link da prova na URL
        window.onload = function() {
            const urlAtual = new URL(window.location.href);
            const provaUrl = urlAtual.searchParams.get('prova');
            
            if (provaUrl) {
                linkDaProvaPura = provaUrl; // Carrega o link
                document.getElementById('secao-professor').style.display = "none";
                document.getElementById('secao-aluno').style.display = "block";
                ligarCamera();
            }
        };

        function gerarLinkAcesso() {
            const urlForms = document.getElementById('input-forms').value.trim();
            if (urlForms.includes("http")) {
                // Monta o link de forma manual para evitar erros de 'undefined'
                const pastaSite = window.location.href.split('?')[0];
                const linkCompleto = pastaSite + "?prova=" + encodeURIComponent(urlForms);
                
                document.getElementById('link-final-texto').innerText = linkCompleto;
                document.getElementById('resultado-link').style.display = "block";
            } else { alert("Cole um link válido do Google Forms."); }
        }

        function copiarLink() {
            const texto = document.getElementById('link-final-texto').innerText;
            navigator.clipboard.writeText(texto).then(() => alert("Copiado!"));
        }

        function ligarCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { document.getElementById('video').srcObject = stream; })
                .catch(err => { alert("Ligue a câmera para prosseguir."); });
        }

        function tirarFoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            video.style.display = 'none'; canvas.style.display = 'block';
            document.getElementById('btn-start').style.display = 'block';
        }

        function validarEIniciar() {
            document.getElementById('interface-usuario').style.display = "none";
            document.getElementById('container-prova').style.display = "block";
            // Adiciona timestamp para não travar no cache
            document.getElementById('prova-frame').src = linkDaProvaPura + "&t=" + Date.now();
            
            // Ativa Anti-Cola
            document.addEventListener("visibilitychange", function() {
                if (document.hidden) {
                    contadorSaidas++;
                    document.getElementById('contagem-saidas').innerText = contadorSaidas;
                    
                    // Reset: Muda o número da cola e força recarregamento
                    let linkComCola = linkDaProvaPura.replace(/=\d+$/, "=" + contadorSaidas);
                    document.getElementById('prova-frame').src = linkComCola + "&refresh=" + Date.now();
                    
                    document.getElementById('container-prova').style.display = "none";
                    document.getElementById('aviso-bloqueio').style.display = "flex";
                }
            });
        }

        function desbloquear() {
            document.getElementById('container-prova').style.display = "block";
            document.getElementById('aviso-bloqueio').style.display = "none";
        }
    </script>
</body>
</html>
