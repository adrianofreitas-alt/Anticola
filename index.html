<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Avaliação Oficial - Anticola</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #202124; font-family: sans-serif; overflow: hidden; }
        #container-prova { width: 100%; height: 100vh; transition: filter 0.3s; }
        iframe { width: 100%; height: 100%; border: none; }
        .blurred { filter: blur(20px); pointer-events: none; }
        #aviso { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; text-align: center; z-index: 9999; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="aviso">
        <h2>Atividade Suspensa!</h2>
        <p>Você saiu da aba da prova. O desvio foi registrado.</p>
        <button onclick="voltar()">Retomar Prova</button>
    </div>
    <div id="container-prova">
        <iframe src="COLE_AQUI_O_LINK_DO_SEU_FORMULARIO"></iframe>
    </div>
    <script>
        function bloquear() { document.getElementById('container-prova').classList.add('blurred'); document.getElementById('aviso').style.display = 'block'; }
        function voltar() { document.getElementById('container-prova').classList.remove('blurred'); document.getElementById('aviso').style.display = 'none'; }
        window.onblur = bloquear;
        document.addEventListener("visibilitychange", function() { if (document.hidden) bloquear(); });
    </script>
</body>
</html>
