<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Anticola v5 - Prof. Adriano</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background: #121212; 
            font-family: sans-serif; 
            color: white; 
            text-align: center; 
            overflow-x: hidden; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            max-width: 500px; 
            margin: 15px auto; 
            width: 85%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h1, h2 { margin-top: 0; font-size: 1.4em; }
        p { font-size: 0.9em; margin: 10px 0; }
        input { 
            width: 90%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid #1a73e8; 
            background: #2b2b2b; 
            color: white; 
            margin-bottom: 10px; 
            text-align: center;
        }
        .url-gerada { 
            background: #000; 
            padding: 10px; 
            border-radius: 5px; 
            color: #00c853; 
            word-break: break-all; 
            font-family: monospace; 
            font-size: 11px; 
            border: 1px solid #00c853; 
            cursor: pointer; 
            margin-top: 10px;
        }
        video, #canvas { 
            width: 100%; 
            max-width: 240px; 
            border-radius: 10px; 
            background: #000; 
            margin: 10px auto; 
            display: block; 
        }
        video { transform: scaleX(-1); }
        .btn { 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 0.95em; 
            margin-top: 8px; 
            transition: 0.2s; 
        }
        .btn-gerar { background: #1a73e8; color: white; }
        .btn-foto { background: #f4b400; color: #000; }
        .btn-iniciar { background: #00c853; color: white; display: none; }
        
        #container-prova { 
            width: 100%; 
            height: 100vh; 
            display: none; 
            background: white; 
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        #aviso-bloqueio { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
            padding: 20px; 
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="interface-usuario">
        <div class="card">
            <div id="secao-professor">
                <h2>👨‍🏫 Gerador de Link</h2>
                <p style="color: #ccc;">Cole o link que termina em <b>=0</b></p>
                <input type="text" id="input-forms" placeholder="Link do Google Forms...">
                <button class="btn btn-gerar" onclick="gerarLinkAcesso()">GERAR LINK DO ALUNO</button>
                <div id="resultado-link" style="display:none;">
                    <p style="margin-top:15px; color:#aaa;">Clique abaixo para copiar o link gerado:</p>
                    <div class="url-generada" id="link-final-texto" onclick="copiarLink()"></div>
                </div>
            </div>

            <div id="secao-aluno" style="display:none">
                <h1>📸 Identificação Obrigatória</h1>
                <p>Posicione seu rosto em frente à câmera e tire uma foto para liberar sua prova.</p>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none"></canvas>
                <button class="btn btn-foto" id="btn-snap" onclick="tirarFoto()">CAPTURAR FOTO</button>
