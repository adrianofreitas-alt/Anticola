<script>
    // Seu link do Google Apps Script (Deixe como está)
    const URL_API_AUDITORIA = 'https://script.google.com/macros/s/AKfycbxmcTKdPT56io4KxOOojD_OmtxqwUwN8IFuPj6_Nat3LpMMBEHR_6vVw7RVZbNTS6hQ8w/exec';

    let contadorSaidas = 0;
    let linkDaProvaPura = "";
    let segurancaAtiva = false; 
    
    window.onload = function() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const provaUrl = urlParams.get('prova');
            if (provaUrl) {
                linkDaProvaPura = decodeURIComponent(provaUrl);
                document.getElementById('secao-professor').style.display = "none";
                document.getElementById('secao-aluno').style.display = "block";
                
                // Adiciona dinamicamente os inputs para o aluno se identificar antes da foto
                const secaoAluno = document.getElementById('secao-aluno');
                const inputsHtml = `
                    <input type="text" id="aluno-nome" placeholder="Seu Nome Completo..." style="margin-top:10px;">
                    <input type="email" id="aluno-email" placeholder="Seu E-mail Escolar...">
                `;
                secaoAluno.insertAdjacentHTML('afterbegin', inputsHtml);
                
                ligarCamera();
            }
        } catch (e) {
            console.error("Erro ao processar URL:", e);
        }
    };
    
    function gerarLinkAcesso() {
        let urlForms = document.getElementById('input-forms').value.trim();
        if (urlForms.includes("http")) {
            const siteUrl = window.location.href.split('?')[0];
            const linkCompleto = siteUrl + "?prova=" + encodeURIComponent(urlForms);
            document.getElementById('link-final-texto').innerText = linkCompleto;
            document.getElementById('resultado-link').style.display = "block";
        } else { 
            alert("Cole um link válido do Google Forms."); 
        }
    }
    
    function copiarLink() {
        const texto = document.getElementById('link-final-texto').innerText;
        navigator.clipboard.writeText(texto).then(() => alert("Copiado com sucesso!"));
    }
    
    function ligarCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { 
            document.getElementById('video').srcObject = stream; 
        })
        .catch(err => { 
            alert("Para continuar, é obrigatório permitir o acesso à câmera."); 
        });
    }
    
    function tirarFoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        canvas.width = 320;
        canvas.height = 240;
        canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
        
        video.style.display = 'none';
        canvas.style.display = 'block';
        document.getElementById('btn-start').style.display = 'block';
        document.getElementById('btn-snap').innerText = "TIRAR OUTRA FOTO";
    }

    function validarEIniciar() {
        // Captura os dados digitados pelo aluno
        let nomeAluno = document.getElementById('aluno-nome').value.trim();
        let emailAluno = document.getElementById('aluno-email').value.trim();

        if (!nomeAluno || !emailAluno) {
            alert("Por favor, preencha seu Nome e E-mail antes de entrar na prova.");
            return;
        }

        document.getElementById('interface-usuario').style.display = "none";
        document.getElementById('container-prova').style.display = "block";
        
        let separador = linkDaProvaPura.includes('?') ? '&' : '?';
        document.getElementById('prova-frame').src = linkDaProvaPura + separador + "embedded=true&refresh=" + Date.now();
        
        ativarSeguranca();
        
        let fotoBase64 = document.getElementById('canvas').toDataURL('image/jpeg', 0.4);
        
        // ENVIO DINÂMICO: Agora envia os dados REAIS do aluno para o seu Google Sheets
        let formData = new URLSearchParams();
        formData.append('email', emailAluno);
        formData.append('nome', nomeAluno);
        formData.append('acao', 'registro_inicial');
        formData.append('foto', fotoBase64);

        fetch(URL_API_AUDITORIA, {
            method: 'POST',
            mode: 'no-cors', 
            body: formData
        }).catch(err => console.log("Aviso de rede:", err));
    }

    function ativarSeguranca() {
        if (segurancaAtiva) return; 
        segurancaAtiva = true;
        document.addEventListener("visibilitychange", function() {
            if (document.hidden && document.getElementById('container-prova').style.display === "block") {
                contadorSaidas++;
                document.getElementById('contagem-saidas').innerText = contadorSaidas;
                
                document.getElementById('container-prova').style.display = "none";
                document.getElementById('aviso-bloqueio').style.display = "flex";
                
                notificarServidor('alerta_desvio');
            }
        });
    }
    
    function desbloquear() {
        document.getElementById('aviso-bloqueio').style.display = "none";
        document.getElementById('container-prova').style.display = "block";
        
        let separador = linkDaProvaPura.includes('?') ? '&' : '?';
        document.getElementById('prova-frame').src = linkDaProvaPura + separador + "embedded=true&refresh=" + Date.now();
    }

    // Notificação dinâmica de desvio de aba
    function notificarServidor(tipoAcao) {
        let nomeAluno = document.getElementById('aluno-nome').value.trim();
        let emailAluno = document.getElementById('aluno-email').value.trim();

        let urlFinalEnvio = URL_API_AUDITORIA + 
            "?email=" + encodeURIComponent(emailAluno) + 
            "&nome=" + encodeURIComponent(nomeAluno) + 
            "&id_sistema=" + encodeURIComponent("Render-ID") + 
            "&acao=" + encodeURIComponent(tipoAcao) +
            "&t=" + Date.now();

        let sinalizador = new Image();
        sinalizador.src = urlFinalEnvio;
    }
</script>
