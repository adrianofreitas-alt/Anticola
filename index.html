<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Provas - Prof. Adriano</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; text-align: center; overflow: hidden; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 550px; margin: 50px auto; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Área de Geração (Professor) */
        #painel-professor { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed #555; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: 2px solid #1a73e8; background: #2b2b2b; color: white; margin-bottom: 15px; font-size: 14px; }
        .url-gerada { background: #000; padding: 10px; border-radius: 5px; color: #00c853; word-break: break-all; font-family: monospace; font-size: 12px; margin: 10px 0; border: 1px solid #00c853; }
        
        /* Área do Aluno */
        video, canvas { width: 100%; max-width: 400px; border-radius: 10px; background: #000; transform: scaleX(-1); margin: 15px 0; border: 2px solid #333; }
        .btn { padding: 15px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; transition: 0.3s; }
        .btn-gerar { background: #1a73e8; color: white; }
        .btn-foto { background: #f4b400; color: #000; margin-bottom: 10px; }
        .btn-iniciar { background: #00c853; color: white; display: none; }

        /* Container da Prova */
        #container-prova { width: 100%; height: 100vh; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        #aviso-bloqueio { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="interface-usuario">
        <div class="card">
            <div id="secao-professor">
                <h2>👨‍🏫 Painel do Professor</h2>
                <p>Cole o link do Forms (com o final =0) para gerar o acesso do aluno:</p>
                <input type="text" id="input-forms" placeholder="https://docs.google.com/forms/...">
                <button class="btn btn-gerar" onclick="gerarLinkAcesso()">GERAR ENDEREÇO DA PROVA</button>
                <div id="resultado-link" style="display:none">
                    <p style="font-size: 13px; color: #aaa;">Envie este link para os alunos:</p>
                    <div class="url-gerada" id="link-final-texto"></div>
                </div>
            </div>

            <div id="secao-aluno" style="display:none">
                <h1 id="titulo-prova">📝 Avaliação Identificada</h1>
                <p>Para acessar, capture sua foto de identificação:</p>
                
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none"></canvas>

                <button class="btn btn-foto" id="btn-snap" onclick="tirarFoto()">CAPTURAR MINHA FOTO</button>
                <button class="btn btn-iniciar" id="btn-start" onclick="validarEIniciar()">INICIAR PROVA AGORA</button>
            </div>
        </div>
    </div>

    <div id="aviso-bloqueio">
        <h1 style="color:red; font-size: 4em;">⚠️ BLOQUEADO</h1>
        <p>Saída de tela detectada. Esta ação foi registrada no sistema.</p>
        <div style="font-size:5em;" id="contagem-saidas">0</div>
        <button class="btn" style="width:200px" onclick="desbloquear()">VOLTAR</button>
    </div>

    <div id="container-prova">
        <iframe id="prova-frame" src=""></iframe>
    </div>

    <script>
        let contadorSaidas = 0;
        let linkDaProvaPura = "";

        // 1. VERIFICAR SE JÁ EXISTE UMA PROVA NA URL AO ABRIR O SITE
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const provaUrl = params.get('prova');

            if (provaUrl) {
                // Modo Aluno
                linkDaProvaPura = decodeURIComponent(provaUrl);
                document.getElementById('secao-professor').style.display = "none";
                document.getElementById('secao-aluno').style.display = "block";
                ligarCamera();
            }
        };

        // 2. FUNÇÃO DO PROFESSOR: GERA O "NOVO ENDEREÇO"
        function gerarLinkAcesso() {
            const urlForms = document.getElementById('input-forms').value.trim();
            if (urlForms.includes("entry.")) {
                const urlBaseSite = window.location.href.split('?')[0];
                const linkCompleto = urlBaseSite + "?prova=" + encodeURIComponent(urlForms);
                
                document.getElementById('link-final-texto').innerText = linkCompleto;
                document.getElementById('resultado-link').style.display = "block";
            } else {
                alert("Use o link oficial gerado pelo seu Script do Google!");
            }
        }

        // 3. FUNÇÕES DE CÂMERA
        function ligarCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { document.getElementById('video').srcObject = stream; })
                .catch(err => { alert("A câmera é obrigatória para realizar a prova."); });
        }

        function tirarFoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            video.style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-snap').innerText = "TIRAR OUTRA FOTO";
        }

        // 4. INICIAR E SEGURANÇA
        function validarEIniciar() {
            document.getElementById('interface-usuario').style.display = "none";
            document.getElementById('container-prova').style.display = "block";
            document.getElementById('prova-frame').src = linkDaProvaPura;
            
            // Ativa o Anti-Cola
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    contadorSaidas++;
                    document.getElementById('contagem-saidas').innerText = contadorSaidas;
                    
                    // Atualiza o link do formulário com o novo peso de cola
                    let linkComCola = linkDaProvaPura.replace(/=\d+$/, "=" + contadorSaidas);
                    document.getElementById('prova-frame').src = linkComCola;
                    
                    document.getElementById('container-prova').style.filter = "blur(40px)";
                    document.getElementById('aviso-bloqueio').style.display = "flex";
                }
            });
        }

        function desbloquear() {
            document.getElementById('container-prova').style.filter = "none";
            document.getElementById('aviso-bloqueio').style.display = "none";
        }
    </script>
</body>
</html>
