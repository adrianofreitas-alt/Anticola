<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Avaliação Segura</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .camera-box {
            width: 100%;
            max-width: 400px;
            height: 300px;
            background-color: #0f172a;
            border-radius: 12px;
            margin: 0 auto 25px auto;
            overflow: hidden;
            position: relative;
            border: 2px solid #334155;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        #frame-prova {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 9999;
            background: white;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container" id="fluxo-identificacao">
        <div class="card">
            <h1>Verificação de Identidade</h1>
            <p>Preencha os dados e posicione-se em frente à câmera para entrar na avaliação.</p>
            
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome">
            </div>

            <div class="form-group">
                <label for="email">E-mail Institucional</label>
                <input type="email" id="email" placeholder="Digite seu e-mail">
            </div>

            <div class="camera-box">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>

            <button id="btn-entrar" onclick="iniciarAvaliacao()">Tirar Foto e Entrar na Prova</button>
            <div id="status" class="status-msg"></div>
        </div>
    </div>

    <iframe id="frame-prova" src=""></iframe>

    <script>
        // ==========================================
        // CONFIGURAÇÃO: COLE SUA URL DO GOOGLE AQUI
        // ==========================================
        const URL_API_AUDITORIA = 'COLE_AQUI_SUA_URL_DO_GOOGLE_APPS_SCRIPT';

        let streamMedia = null;
        let URL_PROVA_FINAL = '';
        let alunoEmail = '';
        let alunoNome = '';

        // Captura automaticamente o link da prova vindo da URL (?prova=...)
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const provaUrl = params.get('prova');
            if (provaUrl) {
                URL_PROVA_FINAL = decodeURIComponent(provaUrl);
            } else {
                document.getElementById('status').innerText = 'Erro: Nenhuma URL de prova foi fornecida na barra de endereços.';
                document.getElementById('btn-entrar').disabled = true;
            }
            configurarCamera();
        });

        // Configura e liga a Webcam do dispositivo
        async function configurarCamera() {
            try {
                streamMedia = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
                document.getElementById('video').srcObject = streamMedia;
            } catch (err) {
                console.error("Erro ao acessar câmera: ", err);
                document.getElementById('status').style.color = 'var(--error)';
                document.getElementById('status').innerText = 'Acesso à câmera foi negado ou não encontrado. Ative a permissão.';
                document.getElementById('btn-entrar').disabled = true;
            }
        }

        // Fluxo principal ao clicar no botão
        async function iniciarAvaliacao() {
            alunoNome = document.getElementById('nome').value.trim();
            alunoEmail = document.getElementById('email').value.trim();
            const btn = document.getElementById('btn-entrar');
            const statusDiv = document.getElementById('status');

            if (!alunoNome || !alunoEmail) {
                statusDiv.style.color = 'var(--error)';
                statusDiv.innerText = 'Por favor, preencha o seu nome e o seu e-mail antes de prosseguir.';
                return;
            }

            btn.disabled = true;
            statusDiv.style.color = 'var(--text)';
            statusDiv.innerText = 'Processando imagem e registrando entrada...';

            // Captura a foto estática do vídeo
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 640;
            canvas.height = 480;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Transforma a imagem em string Base64 compactada
            const fotoBase64 = canvas.toDataURL('image/jpeg', 0.7);

            // Monta o payload JSON moderno
            const payload = {
                nome: alunoNome,
                email: alunoEmail,
                foto: fotoBase64,
                acao: 'registro_inicial'
            };

            try {
                // Envia os dados de forma assíncrona para o Google Scripts
                await fetch(URL_API_AUDITORIA, {
                    method: 'POST',
                    mode: 'no-cors', // Evita bloqueios de CORS do navegador
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Como usamos 'no-cors', o navegador não lê a resposta de sucesso, 
                // então assumimos o envio e liberamos a prova em seguida.
                statusDiv.innerText = 'Sucesso! Abrindo avaliação...';
                setTimeout(() => {
                    liberarTelaProva();
                }, 1000);

            } catch (error) {
                console.error("Erro no envio:", error);
                statusDiv.style.color = 'var(--error)';
                statusDiv.innerText = 'Erro ao conectar ao servidor de auditoria. Tente novamente.';
                btn.disabled = false;
            }
        }

        // Remove o formulário de identificação e injeta a prova na tela inteira
        function liberarTelaProva() {
            // Desliga a câmera para economizar processamento
            if (streamMedia) {
                streamMedia.getTracks().forEach(track => track.stop());
            }

            document.getElementById('fluxo-identificacao').style.display = 'none';
            const frame = document.getElementById('frame-prova');
            frame.src = URL_PROVA_FINAL;
            frame.style.display = 'block';

            // Ativa o monitoramento antifraude de abas e janelas
            ativarRastreamentoDesvios();
        }

        // Monitora se o aluno tentou sair do ambiente da prova
        function ativarRastreamentoDesvios() {
            let perdeuFoco = false;

            window.addEventListener('blur', () => {
                if (!perdeuFoco) {
                    perdeuFoco = true;
                    console.log("Desvio detectado: O aluno saiu da aba da prova.");
                    
                    // Dispara uma requisição GET leve e em segundo plano informando o desvio
                    navigator.sendBeacon(`${URL_API_AUDITORIA}?email=${encodeURIComponent(alunoEmail)}&acao=alerta_desvio`);
                    
                    // Alerta o aluno visualmente
                    alert("AVISO DE SEGURANÇA:\nDetectamos que você saiu da tela da avaliação. Esta ação foi registrada no relatório de auditoria do professor.");
                    
                    setTimeout(() => { perdeuFoco = false; }, 1000);
                }
            });
        }
    </script>
</body>
</html> r
