<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Portal Anticola v6 - Com Foto na Planilha</title>
<style>
body, html { margin: 0; padding: 0; height: 100%; background: #121212; font-family: sans-serif; color: white; text-align: center; overflow-x: hidden; }
.card { background: #1e1e1e; padding: 20px; border-radius: 20px; border: 1px solid #333; max-width: 500px; margin: 15px auto; width: 85%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h1, h2 { margin-top: 0; font-size: 1.4em; }
p { font-size: 0.9em; margin: 10px 0; }
input { width: 90%; padding: 12px; border-radius: 8px; border: 2px solid #1a73e8; background: #2b2b2b; color: white; margin-bottom: 10px; }
.url-gerada { background: #000; padding: 10px; border-radius: 5px; color: #00c853; word-break: break-all; font-family: monospace; font-size: 10px; border: 1px solid #00c853; cursor: pointer; }
video, #canvas { width: 100%; max-width: 180px; border-radius: 10px; background: #000; margin: 5px auto; display: block; }
video { transform: scaleX(-1); }
.btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; font-size: 0.95em; margin-top: 8px; transition: 0.2s; }
.btn-gerar { background: #1a73e8; color: white; }
.btn-foto { background: #f4b400; color: #000; }
.btn-iniciar { background: #00c853; color: white; display: none; }
.loading { display: none; text-align: center; margin-top: 10px; color: #ff9800; }
@media (max-width: 400px) { .card { padding: 15px; margin: 10px auto; } video, #canvas { max-width: 140px; } h1 { font-size: 1.2em; } .btn { padding: 10px; font-size: 0.85em; } }
#container-prova { width: 100%; height: 100vh; display: none; background: white; position: fixed; top: 0; left: 0; z-index: 1000; }
iframe { width: 100%; height: 100%; border: none; }
#aviso-bloqueio { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
</style>
</head>
<body>

<div id="interface-usuario">
  <div class="card">
    <div id="secao-professor">
      <h2>👨‍🏫 Gerador de Link</h2>
      <p style="color: #ccc;">Cole o link do Google Forms com a prova</p>
      <input type="text" id="input-forms" placeholder="Link completo do forms...">
      <input type="text" id="input-email" placeholder="Email do aluno para teste (opcional)">
      <input type="text" id="input-nome" placeholder="Nome do aluno (opcional)">
      <button class="btn btn-gerar" onclick="gerarLinkAcesso()">GERAR LINK DO ALUNO</button>
      <div id="resultado-link" style="display:none; margin-top:10px;">
        <div class="url-gerada" id="link-final-texto" onclick="copiarLink()"></div>
      </div>
    </div>

    <div id="secao-aluno" style="display:none">
      <h1>📸 Identificação</h1>
      <p>Tire uma selfie para entrar na prova.</p>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none"></canvas>
      <button class="btn btn-foto" id="btn-snap" onclick="tirarFoto()">📷 CAPTURAR FOTO</button>
      <button class="btn btn-iniciar" id="btn-start" onclick="validarEIniciar()">✅ ENTRAR NA PROVA</button>
      <div class="loading" id="loading-registro">Enviando foto para planilha...</div>
    </div>
  </div>
</div>

<div id="aviso-bloqueio">
  <h1 style="color:red;">⚠️ ALERTA</h1>
  <p>Você saiu da página! A prova foi resetada.</p>
  <div style="font-size:3em; color:white; font-weight: bold;" id="contagem-saidas">0</div>
  <button class="btn" style="max-width:250px; background:white; color:black" onclick="desbloquear()">RECOMEÇAR</button>
</div>

<div id="container-prova">
  <iframe id="prova-frame" src="" allow="camera; microphone"></iframe>
</div>

<script>
// CONFIGURAÇÃO - COLOQUE A URL DO SEU GOOGLE APPS SCRIPT AQUI
// Exemplo: const SCRIPT_URL = 'https://script.google.com/macros/s/SEU_ID/exec';
const SCRIPT_URL = ''; // <-- COLE A URL DO SEU WEB APP AQUI

let contadorSaidas = 0;
let linkDaProvaPura = "";
let segurancaAtiva = false;
let fotoCapturada = null;
let emailAluno = "";
let nomeAluno = "";
let streamCamera = null;

window.onload = function() {
  const urlParams = new URLSearchParams(window.location.search);
  const provaUrl = urlParams.get('prova');
  const emailParam = urlParams.get('email');
  const nomeParam = urlParams.get('nome');
  
  if (provaUrl) {
    emailAluno = emailParam || "";
    nomeAluno = nomeParam || "";
    linkDaProvaPura = decodeURIComponent(provaUrl);
    document.getElementById('secao-professor').style.display = "none";
    document.getElementById('secao-aluno').style.display = "block";
    ligarCamera();
  }
};

function gerarLinkAcesso() {
  let urlForms = document.getElementById('input-forms').value.trim();
  let email = document.getElementById('input-email').value.trim();
  let nome = document.getElementById('input-nome').value.trim();
  
  if (urlForms.includes("http")) {
    const siteUrl = window.location.href.split('?')[0];
    let linkCompleto = siteUrl + "?prova=" + encodeURIComponent(urlForms);
    if (email) linkCompleto += "&email=" + encodeURIComponent(email);
    if (nome) linkCompleto += "&nome=" + encodeURIComponent(nome);
    
    document.getElementById('link-final-texto').innerText = linkCompleto;
    document.getElementById('resultado-link').style.display = "block";
  } else { 
    alert("Cole um link válido do Google Forms."); 
  }
}

function copiarLink() {
  const texto = document.getElementById('link-final-texto').innerText;
  navigator.clipboard.writeText(texto).then(() => alert("Link copiado!"));
}

function ligarCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(stream => {
      streamCamera = stream;
      document.getElementById('video').srcObject = stream;
    })
    .catch(err => { 
      alert("Por favor, permita o acesso à câmera para prosseguir.");
      console.error(err);
    });
}

function tirarFoto() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  
  if (video.videoWidth === 0 || video.videoHeight === 0) {
    alert("Aguarde a câmera iniciar completamente.");
    return;
  }
  
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  
  // Converte canvas para base64
  fotoCapturada = canvas.toDataURL('image/jpeg', 0.8);
  
  video.style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('btn-start').style.display = 'block';
  document.getElementById('btn-snap').innerHTML = "📸 TIRAR OUTRA FOTO";
}

async function enviarFotoParaPlanilha() {
  if (!SCRIPT_URL) {
    console.warn("SCRIPT_URL não configurado. A foto não será salva na planilha.");
    return false;
  }
  
  const loading = document.getElementById('loading-registro');
  loading.style.display = 'block';
  
  try {
    const response = await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        acao: 'registro_inicial',
        email: emailAluno,
        nome: nomeAluno,
        foto: fotoCapturada
      })
    });
    
    loading.style.display = 'none';
    console.log("Foto enviada para planilha!");
    return true;
  } catch(err) {
    loading.style.display = 'none';
    console.error("Erro ao enviar foto:", err);
    alert("Aviso: Não foi possível salvar a foto na planilha. A prova continuará.");
    return false;
  }
}

async function validarEIniciar() {
  if (!fotoCapturada) {
    alert("Por favor, tire uma foto antes de continuar.");
    return;
  }
  
  // Envia a foto para a planilha
  await enviarFotoParaPlanilha();
  
  // Esconde interface e mostra prova
  document.getElementById('interface-usuario').style.display = "none";
  document.getElementById('container-prova').style.display = "block";
  atualizarIframe();
  ativarSeguranca();
}

function atualizarIframe() {
  let iframe = document.getElementById('prova-frame');
  let urlCompleta = linkDaProvaPura;
  
  // Adiciona parâmetros de controle se necessário
  let separador = urlCompleta.includes('?') ? '&' : '?';
  urlCompleta += separador + 'desvios=' + contadorSaidas;
  
  iframe.src = urlCompleta;
}

async function registrarSaida() {
  if (!SCRIPT_URL) return;
  
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        acao: 'registro_saida',
        email: emailAluno,
        nome: nomeAluno
      })
    });
  } catch(err) {
    console.error("Erro ao registrar saída:", err);
  }
}

function ativarSeguranca() {
  segurancaAtiva = true;
  
  // Detecta quando o usuário tenta sair da página
  document.addEventListener('visibilitychange', function() {
    if (!segurancaAtiva) return;
    
    if (document.hidden) {
      // Aluno saiu da página (trocou de app/aba)
      contadorSaidas++;
      document.getElementById('contagem-saidas').innerText = contadorSaidas;
      document.getElementById('aviso-bloqueio').style.display = 'flex';
      document.getElementById('container-prova').style.display = 'none';
      registrarSaida();
      
      // Se atingiu limite (opcional)
      if (contadorSaidas >= 3) {
        alert("Você excedeu o limite de saídas! A prova foi bloqueada.");
      }
    }
  });
  
  // Bloqueia gesto de voltar (para mobile)
  history.pushState(null, null, location.href);
  window.addEventListener('popstate', function() {
    if (segurancaAtiva) {
      history.pushState(null, null, location.href);
      contadorSaidas++;
      document.getElementById('contagem-saidas').innerText = contadorSaidas;
      document.getElementById('aviso-bloqueio').style.display = 'flex';
      document.getElementById('container-prova').style.display = 'none';
      registrarSaida();
    }
  });
}

function desbloquear() {
  // Recarrega a página para reiniciar completamente
  location.reload();
}

// Limpa stream da câmera ao sair
window.addEventListener('beforeunload', function() {
  if (streamCamera) {
    streamCamera.getTracks().forEach(track => track.stop());
  }
});
</script>
</body>
</html>
