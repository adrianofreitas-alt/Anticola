<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Anticola v5 - Prof. Adriano</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #121212; font-family: sans-serif; color: white; text-align: center; overflow: hidden; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 500px; margin: 30px auto; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 95%; padding: 12px; border-radius: 8px; border: 2px solid #1a73e8; background: #2b2b2b; color: white; margin-bottom: 15px; }
        .url-gerada { background: #000; padding: 15px; border-radius: 5px; color: #00c853; word-break: break-all; font-family: monospace; font-size: 11px; border: 1px solid #00c853; cursor: pointer; }
        
        /* AJUSTE SOLICITADO: Diminuí o tamanho de 350px para 200px e apliquei ao canvas também */
        video, #canvas { 
            width: 100%; 
            max-width: 200px; 
            border-radius: 10px; 
            background: #000; 
            margin: 0 auto 15px auto;
        }
        video { transform: scaleX(-1); }

        .btn { padding: 15px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; margin-top: 10px; transition: 0.2s; }
        .btn-gerar { background: #1a73e8; color: white; }
        .btn-foto { background: #f4b400; color: #000; }
        .btn-iniciar { background: #00c853; color: white; display: none; }
        #container-prova { width: 100%; height: 100vh; display: none; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
        #aviso-bloqueio { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>
    <div id="interface-usuario">
        <div class="card">
            <div id="secao-professor">
                <h2> 👨‍🏫 Gerador de Link Blindado</h2>
                <p style="font-size: 0.9em; color: #ccc;">Cole o link que termina em <b>=0</b></p>
                <input type="text" id="input-forms" placeholder="https://docs.google.com/forms/d/e/.../viewform?usp=pp_url&entry.123=0">
                <button class="btn btn-gerar" onclick="gerarLinkAcesso()">GERAR LINK DO ALUNO</button>
                <div id="resultado-link" style="display:none; margin-top:15px;">
                    <p style="font-size: 12px; color: #aaa;">Link gerado (clique para copiar):</p>
                    <div class="url-gerada" id="link-final-texto" onclick="copiarLink()"></div>
                </div>
            </div>
            <div id="secao-aluno" style="display:none">
                <h1> 📸 Identificação</h1>
                <p>Capture sua foto para liberar a prova.</p>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none"></canvas>
                <button class="btn btn-foto" id="btn-snap" onclick="tirarFoto()">CAPTURAR FOTO</button>
                <button class="btn btn-iniciar" id="btn-start" onclick="validarEIniciar()">ENTRAR NA PROVA</button>
            </div>
        </div>
    </div>

    <div id="aviso-bloqueio">
        <h1 style="color:red;"> ⚠️ TENTATIVA DE COLA</h1>
        <p>Você saiu da página! O formulário foi resetado por segurança.</p>
        <div style="font-size:4em; color:white; font-weight: bold;" id="contagem-saidas">0</div>
        <p>Preencha seu nome e e-mail novamente.</p>
        <button class="btn" style="width:250px; background:white; color:black" onclick="desbloquear()">RECOMEÇAR TUDO</button>
    </div>

    <div id="container-prova">
        <iframe id="prova-frame" src="" allow="camera"></iframe>
    </div>

    <script>
        let contadorSaidas = 0;
        let linkDaProvaPura = "";

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const provaUrl = urlParams.get('prova');
            if (provaUrl) {
                linkDaProvaPura = decodeURIComponent(provaUrl);
                document.getElementById('secao-professor').style.display = "none";
                document.getElementById('secao-aluno').style.display = "block";
                ligarCamera();
            }
        };

        function gerarLinkAcesso() {
            let urlForms = document.getElementById('input-forms').value.trim();
            if (urlForms.includes("http")) {
                if (urlForms.includes("/edit")) {
                    alert("Você colou o link de edição! Use o link de visualização.");
                    return;
                }
                const siteUrl = window.location.href.split('?')[0];
                const linkCompleto = siteUrl + "?prova=" + encodeURIComponent(urlForms);
                document.getElementById('link-final-texto').innerText = linkCompleto;
                document.getElementById('resultado-link').style.display = "block";
            } else { alert("Cole um link válido."); }
        }

        function copiarLink() {
            const texto = document.getElementById('link-final-texto').innerText;
            navigator.clipboard.writeText(texto).then(() => alert("Copiado com sucesso!"));
        }

        function ligarCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => { console.log("Câmera não iniciada"); });
        }

        function tirarFoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            video.style.display = 'none'; 
            canvas.style.display = 'inline-block'; // Mantém centralizado
            document.getElementById('btn-start').style.display = 'block';
        }

        function validarEIniciar() {
            document.getElementById('interface-usuario').style.display = "none";
            document.getElementById('container-prova').style.display = "block";
            let urlFinal = linkDaProvaPura + (linkDaProvaPura.includes('?') ? '&' : '?') + "embedded=true";
            document.getElementById('prova-frame').src = urlFinal;
            ativarSeguranca();
        }

        function ativarSeguranca() {
            document.addEventListener("visibilitychange", function() {
                if (document.hidden) {
                    contadorSaidas++;
                    document.getElementById('contagem-saidas').innerText = contadorSaidas;
                    let linkBase = linkDaProvaPura.replace(/=\d+$/, "=" + contadorSaidas);
                    document.getElementById('prova-frame').src = linkBase + "&refresh=" + Date.now();
                    document.getElementById('container-prova').style.display = "none";
                    document.getElementById('aviso-bloqueio').style.display = "flex";
                }
            });
        }

        function desbloquear() {
            document.getElementById('container-prova').style.display = "block";
            document.getElementById('aviso-bloqueio').style.display = "none";
        }
    </script>
</body>
</html>
