<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Oficial - Sistema Anticola</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #202124; font-family: sans-serif; overflow: hidden; }
        #container-prova { width: 100%; height: 100vh; transition: filter 0.3s; }
        iframe { width: 100%; height: 100%; border: none; }
        .blurred { filter: blur(25px); pointer-events: none; }
        #aviso { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: white; 
            padding: 30px; border-radius: 15px; text-align: center; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 9999; 
            min-width: 300px;
        }
        #contador-texto { color: red; font-size: 1.5em; font-weight: bold; margin: 15px 0; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="aviso">
        <h2>⚠️ Atividade Suspensa!</h2>
        <p>Você saiu da tela da prova para buscar outras informações.</p>
        <div id="contador-texto">Total de desvios: <span id="num-saidas">0</span></div>
        <p><small>Este histórico será revisado pelo professor.</small></p>
        <button onclick="voltar()">Retomar Prova</button>
    </div>

    <div id="container-prova">
        <iframe id="prova-frame" src="https://docs.google.com/forms/d/e/1FAIpQLSe-0dL0HUKCakhvxEgzOIso56hu9ZnAod8dWFdzuMKsrGGBlg/viewform?usp=header"></iframe>
    </div>

    <script>
        const container = document.getElementById('container-prova');
        const aviso = document.getElementById('aviso');
        const displayContador = document.getElementById('num-saidas');
        let contador = 0;

        function bloquear() {
            contador++; // Soma 1 toda vez que sai
            displayContador.innerText = contador; // Atualiza o número na tela
            container.classList.add('blurred');
            aviso.style.display = 'block';
        }

        function voltar() {
            container.classList.remove('blurred');
            aviso.style.display = 'none';
        }

        // Detecta se mudou de aba ou minimizou
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                bloquear();
            }
        });

        // Bloqueio básico de teclas (Ctrl+C, Ctrl+V)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
