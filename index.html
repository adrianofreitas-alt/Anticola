<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Avaliação Segura</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: all 0.3s ease;
        }

        h1, h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .camera-box {
            width: 100%;
            max-width: 400px;
            height: 300px;
            background-color: #0f172a;
            border-radius: 12px;
            margin: 0 auto 25px auto;
            overflow: hidden;
            position: relative;
            border: 2px solid #334155;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .url-gerada { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            color: #10b981;
            word-break: break-all; 
            font-family: monospace; 
            font-size: 12px;
            border: 1px solid #10b981; 
            cursor: pointer;
            margin-top: 15px;
            text-align: left;
        }

        #frame-prova {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 9999;
            background: white;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container" id="interface-sistema">
        <div class="card">
            
            <div id="secao-professor" style="display:none;">
                <h2>👨‍🏫 Gerador de Link de Acesso</h2>
                <p>Cole abaixo o link do Google Forms da avaliação para gerar o acesso seguro do aluno.</p>
                <div class="form-group">
                    <label for="input-forms">Link do Google Forms</label>
                    <input type="text" id="input-forms" placeholder="https://docs.google.com/forms/.../viewform">
                </div>
                <button onclick="gerarLinkAcesso()">Gerar Link do Aluno</button>
                
                <div id="resultado-link" style="display:none;">
                    <div class="url-gerada" id="link-final-texto" onclick="copiarLink()"></div>
                    <p style="margin-top: 8px; font-size: 12px; color: var(--success);">Clique no link verde acima para copiar.</p>
                </div>
            </div>

            <div id="secao-aluno" style="display:none;">
                <h1>📸 Verificação de Identidade</h1>
                <p>Preencha seus dados e posicione-se em frente à câmera para entrar na avaliação.</p>
                
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="email">E-mail Institucional</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail educacional" autocomplete="off">
                </div>

                <div class="camera-box">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                </div>

                <button id="btn-entrar" onclick="iniciarAvaliacao()">Tirar Foto e Entrar na Prova</button>
            </div>

            <div id="status" class="status-msg"></div>
        </div>
    </div>

    <iframe id="frame-prova" src=""></iframe>

    <script>
        const URL_API_AUDITORIA = 'https://script.google.com/macros/s/AKfycbxmcTKdPT56io4KxOOojD_OmtxqwUwN8IFuPj6_Nat3LpMMBEHR_6vVw7RVZbNTS6hQ8w/exec';

        let streamMedia = null;
        let URL_PROVA_FINAL = '';
        let alunoEmail = '';
        let alunoNome = '';
        let totalDesvios = 0; // Contador em tempo real

        // Gerenciador de visualização inicial
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const provaUrl = params.get('prova');
            
            if (provaUrl) {
                URL_PROVA_FINAL = decodeURIComponent(provaUrl);
                document.getElementById('secao-professor').style.display = 'none';
                document.getElementById('secao-aluno').style.display = 'block';
                configurarCamera();
            } else {
                document.getElementById('secao-professor').style.display = 'block';
                document.getElementById('secao-aluno').style.display = 'none';
            }
        });

        function gerarLinkAcesso() {
            let urlForms = document.getElementById('input-forms').value.trim();
            if (urlForms.includes("http")) {
                const siteUrl = window.location.href.split('?')[0];
                const linkCompleto = siteUrl + "?prova=" + encodeURIComponent(urlForms);
                document.getElementById('link-final-texto').innerText = linkCompleto;
                document.getElementById('resultado-link').style.display = "block";
            } else { 
                alert("Por favor, insira um link válido do Google Forms."); 
            }
        }
        
        function copiarLink() {
            const texto = document.getElementById('link-final-texto').innerText;
            navigator.clipboard.writeText(texto).then(() => alert("Link copiado!"));
        }

        async function configurarCamera() {
            try {
                streamMedia = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
                document.getElementById('video').srcObject = streamMedia;
            } catch (err) {
                document.getElementById('status').style.color = 'var(--error)';
                document.getElementById('status').innerText = 'Permita o acesso à câmera para prosseguir.';
                document.getElementById('btn-entrar').disabled = true;
            }
        }

        // Registro Inicial com Foto
        async function iniciarAvaliacao() {
            alunoNome = document.getElementById('nome').value.trim();
            alunoEmail = document.getElementById('email').value.trim();
            const btn = document.getElementById('btn-entrar');
            const statusDiv = document.getElementById('status');

            if (!alunoNome || !alunoEmail) {
                statusDiv.style.color = 'var(--error)';
                statusDiv.innerText = 'Preencha seu nome e e-mail institucional.';
                return;
            }

            btn.disabled = true;
            statusDiv.style.color = 'var(--text)';
            statusDiv.innerText = 'Registrando dados de entrada...';

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 640;
            canvas.height = 480;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const fotoBase64 = canvas.toDataURL('image/jpeg', 0.5);

            let formData = new URLSearchParams();
            formData.append('nome', alunoNome);
            formData.append('email', alunoEmail);
            formData.append('foto', fotoBase64);
            formData.append('acao', 'registro_inicial');

            try {
                await fetch(URL_API_AUDITORIA, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                statusDiv.innerText = 'Sucesso! Iniciando prova...';
                setTimeout(() => { liberarTelaProva(); }, 1000);

            } catch (error) {
                statusDiv.style.color = 'var(--error)';
                statusDiv.innerText = 'Erro ao conectar. Tente novamente.';
                btn.disabled = false;
            }
        }

        function liberarTelaProva() {
            if (streamMedia) {
                streamMedia.getTracks().forEach(track => track.stop());
            }
            document.getElementById('interface-sistema').style.display = 'none';
            const frame = document.getElementById('frame-prova');
            frame.src = URL_PROVA_FINAL;
            frame.style.display = 'block';

            // ATIVA O MONITORAMENTO CORRIGIDO AQUI
            ativarRastreamentoDesvios();
        }

        // FUNÇÃO CORRIGIDA: CAPTURA E ENVIA TODAS AS SAÍDAS SEM FALHAR
        function activarRastreamentoDesvios() {
            window.addEventListener('blur', () => {
                totalDesvios++; // Soma mais uma saída na contagem
                
                console.log(`Desvio detectado número: ${totalDesvios}`);

                // Correção crucial: Enviamos via FormData estruturado para o Beacon disparar um POST aceito pelo Google
                const dadosDesvio = new URLSearchParams();
                dadosDesvio.append('nome', alunoNome);
                dadosDesvio.append('email', alunoEmail);
                dadosDesvio.append('acao', 'alerta_desvio');
                dadosDesvio.append('contagem', totalDesvios);

                // Dispara instantaneamente em segundo plano para o Apps Script
                navigator.sendBeacon(URL_API_AUDITORIA, dadosDesvio);
                
                // Alerta intimidador para o aluno saber que foi pego
                alert(`⚠️ AVISO DE SEGURANÇA:\n\nVocê saiu da aba da prova!\nEsta é a sua ocorrência número ${totalDesvios}.\nO Professor Adriano foi notificado no painel de auditoria.`);
            });
        }
    </script>
</body>
</html>
